<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reground — a self-care toolkit</title>
<meta name="description" content="Calming techniques organized by how you feel right now. Private by design. Pay once. Coming soon to the App Store.">
<meta name="theme-color" content="#f9f6f1" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#131417" media="(prefers-color-scheme: dark)">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath fill='%235d84aa' d='M32 6c11 0 22 8.5 23.5 20.5C57 38.5 50 52 37.5 55.5 25 59 11.5 52 8 39.5 4.5 27 11 14 21.5 9.2 25 7.1 28.5 6 32 6z'/%3E%3C/svg%3E">
<style>
  :root {
    --canvas: #f9f6f1; --ink: #25272e; --muted: #565962; --panic: #5d84aa;
    --serif: ui-serif, "New York", Georgia, "Iowan Old Style", serif;
    --sans: ui-rounded, -apple-system, system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root { --canvas: #131417; --ink: #eceae6; --muted: #a6a49d; --panic: #7aa2c8; }
  }
  * { margin: 0; box-sizing: border-box; }
  body { background: var(--canvas); color: var(--ink); font-family: var(--sans);
         min-height: 100svh; display: grid; place-items: center; padding: 24px;
         background-image: radial-gradient(circle at 85% 8%, color-mix(in srgb, var(--panic) 14%, transparent), transparent 60%); }
  main { max-width: 34rem; text-align: center; }
  .wordmark { font-family: var(--serif); font-size: 1.5rem; display: inline-block; margin-bottom: 2rem; }
  .wordmark .re { position: relative; }
  .wordmark .re svg { position: absolute; left: -2px; bottom: -6px; width: calc(100% + 4px); height: 6px; overflow: visible; }
  .wordmark .re path { stroke: var(--panic); stroke-width: 2.4; fill: none; stroke-linecap: round; }
  h1 { font-family: var(--serif); font-weight: 500; font-size: clamp(1.8rem, 5vw, 2.6rem); line-height: 1.2; text-wrap: balance; }
  p { color: var(--muted); margin-top: 1rem; line-height: 1.6; }
  a.privacy { color: var(--muted); display: inline-block; margin-top: 2.5rem; font-size: .9rem; }
</style>
</head>
<body>
<main>
  <div class="wordmark"><span class="re">Re<svg viewBox="0 0 40 8" preserveAspectRatio="none" aria-hidden="true"><path d="M1.5 6.2 Q20 1.2 38.5 6.2"/></svg></span>ground</div>
  <h1>For the moment your chest tightens.</h1>
  <p>A self-care toolkit of calming techniques, organized by how you feel right now.
     Private by design. Pay once. Coming soon to the App Store.</p>
  <a class="privacy" href="privacy.html">Privacy policy</a>
</main>
</body>
</html>
